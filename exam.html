<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam System | Sudeep Thakur</title>
    <style>
        :root { --bg: #020617; --primary: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .exam-card { background: rgba(15, 23, 42, 0.9); padding: 40px; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid #334155; }
        .timer { color: var(--primary); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
        .question { margin-bottom: 20px; }
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="exam-card">
    <div class="timer" id="timer">Time Left: 05:00</div>
    <div id="quiz">
        <h2 id="question">Loading Question...</h2>
        <div id="options"></div>
    </div>
    <button onclick="nextQuestion()" style="margin-top:20px;">Next Question</button>
</div>

<script>
    const questions = [
        { q: "What is the size of int in Java?", options: ["2 bytes", "4 bytes", "8 bytes", "1 byte"], a: 1 },
        { q: "Which of the following is a database?", options: ["HTML", "CSS", "MySQL", "Java"], a: 2 },
        { q: "What does HTML stand for?", options: ["HyperText Markup Language", "HighText Machine Language", "HyperTool Multi Language", "None"], a: 0 }
    ];

    let current = 0;
    let score = 0;

    function loadQuestion() {
        const qObj = questions[current];
        document.getElementById('question').innerText = qObj.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        qObj.options.forEach((opt, i) => {
            optDiv.innerHTML += `<div style="margin:10px 0;"><input type="radio" name="ans" value="${i}"> ${opt}</div>`;
        });
    }

    function nextQuestion() {
        const selected = document.querySelector('input[name="ans"]:checked');
        if(selected && selected.value == questions[current].a) score++;
        current++;
        if(current < questions.length) loadQuestion();
        else document.getElementById('quiz').innerHTML = `<h2>Exam Finished! Score: ${score}/${questions.length}</h2>`;
    }

    // Timer Logic
    let time = 300;
    setInterval(() => {
        time--;
        document.getElementById('timer').innerText = `Time Left: ${Math.floor(time/60)}:${time%60}`;
    }, 1000);

    loadQuestion();
</script>

</body>
</html>
