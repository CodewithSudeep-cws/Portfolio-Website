<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Online  Exam System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top right, rgba(56,189,248,.15), transparent 30%),
radial-gradient(circle at bottom left, rgba(99,102,241,.15), transparent 30%);
z-index:-1;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-size:3rem;
font-weight:800;
background:linear-gradient(135deg,#38bdf8,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.header p{
color:#94a3b8;
}

.exam-box{
background:rgba(15,23,42,.8);
border:1px solid rgba(255,255,255,.08);
padding:35px;
border-radius:25px;
backdrop-filter:blur(16px);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.timer{
background:linear-gradient(135deg,#ef4444,#f43f5e);
padding:12px 20px;
border-radius:14px;
font-weight:700;
}

.score-box{
background:linear-gradient(135deg,#38bdf8,#6366f1);
padding:12px 20px;
border-radius:14px;
font-weight:700;
}

.question-count{
margin-bottom:15px;
color:#38bdf8;
font-weight:700;
}

.question{
font-size:1.35rem;
margin-bottom:30px;
line-height:1.7;
font-weight:600;
}

.options{
display:grid;
gap:18px;
}

.option{
padding:18px;
border-radius:16px;
background:#111827;
border:1px solid rgba(255,255,255,.06);
cursor:pointer;
transition:.3s;
}

.option:hover{
transform:translateX(6px);
border-color:#38bdf8;
background:#1e293b;
}

.option.correct{
background:#065f46;
border-color:#10b981;
}

.option.wrong{
background:#7f1d1d;
border-color:#ef4444;
}

.btns{
display:flex;
gap:15px;
margin-top:35px;
flex-wrap:wrap;
}

button{
padding:14px 26px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
transition:.3s;
font-size:1rem;
}

.next-btn{
background:linear-gradient(135deg,#38bdf8,#6366f1);
color:white;
}

.restart-btn{
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
}

button:hover{
transform:translateY(-3px);
}

.result-box{
text-align:center;
display:none;
}

.result-box h2{
font-size:2.5rem;
margin-bottom:20px;
background:linear-gradient(135deg,#38bdf8,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.result-box p{
font-size:1.2rem;
margin-bottom:25px;
color:#cbd5e1;
}

.progress-bar{
width:100%;
height:14px;
background:#111827;
border-radius:20px;
overflow:hidden;
margin:25px 0;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#6366f1);
transition:1s;
}

.footer{
margin-top:40px;
text-align:center;
color:#64748b;
}

@media(max-width:768px){
.question{
font-size:1.1rem;
}

.header h1{
font-size:2.2rem;
}

.top-bar{
flex-direction:column;
align-items:flex-start;
}
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>CSJMU Online Exam System</h1>
<p>B.Sc Computer Science MCQ Practice Portal</p>
</div>

<div class="exam-box" id="examBox">

<div class="top-bar">
<div class="timer">
<i class="fas fa-clock"></i>
Time Left: <span id="timer">300</span>s
</div>

<div class="score-box">
<i class="fas fa-star"></i>
Score: <span id="score">0</span>
</div>
</div>

<div id="quizArea">
<div class="question-count" id="questionCount"></div>
<div class="question" id="question"></div>
<div class="options" id="options"></div>

<div class="btns">
<button class="next-btn" onclick="nextQuestion()">
<i class="fas fa-arrow-right"></i>
Next Question
</button>
</div>
</div>

<div class="result-box" id="resultBox">
<h2>Exam Completed!</h2>
<p id="finalScore"></p>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<button class="restart-btn" onclick="restartQuiz()">
<i class="fas fa-rotate"></i>
Restart Exam
</button>
</div>

</div>

<div class="footer">
© 2026 Sudeep Thakur | Advanced Examination Portal
</div>

</div>

<script>

const questionBank=[

{
question:"Which language is mainly used for web page structure?",
options:["Python","HTML","Java","C++"],
answer:"HTML"
},

{
question:"Which CSS property is used for Flexbox layout?",
options:["display:flex","position:flex","layout:flex","align:flex"],
answer:"display:flex"
},

{
question:"Which JavaScript keyword declares a variable?",
options:["int","String","let","define"],
answer:"let"
},

{
question:"Which SQL command is used to fetch data?",
options:["GET","OPEN","SELECT","FETCHROW"],
answer:"SELECT"
},

{
question:"Which scheduling algorithm uses time slices?",
options:["FCFS","SJF","Round Robin","Priority"],
answer:"Round Robin"
},

{
question:"Which topology uses a central hub?",
options:["Bus","Ring","Star","Mesh"],
answer:"Star"
},

{
question:"Which Java concept supports inheritance?",
options:["OOP","Looping","Compiler","Array"],
answer:"OOP"
},

{
question:"Which data structure works on FIFO?",
options:["Stack","Queue","Tree","Graph"],
answer:"Queue"
},

{
question:"Which protocol is used for secure websites?",
options:["HTTP","HTTPS","FTP","SMTP"],
answer:"HTTPS"
},

{
question:"Which OS component manages memory?",
options:["Kernel","Compiler","Browser","Driver"],
answer:"Kernel"
},

{
question:"Which HTML tag is used for hyperlinks?",
options:["<link>","<a>","<href>","<url>"],
answer:"<a>"
},

{
question:"Which database model uses tables?",
options:["Relational","Hierarchical","Network","Object"],
answer:"Relational"
},

{
question:"Which layer handles routing in OSI model?",
options:["Transport","Session","Network","Physical"],
answer:"Network"
},

{
question:"Which Java keyword is used for inheritance?",
options:["this","extends","implements","super"],
answer:"extends"
},

{
question:"Which sorting algorithm is fastest generally?",
options:["Bubble","Selection","Quick Sort","Insertion"],
answer:"Quick Sort"
},

{
question:"Which symbol is used for comments in JavaScript?",
options:["//","<!--","##","**"],
answer:"//"
},

{
question:"Which SQL clause filters records?",
options:["WHERE","ORDER","GROUP","TABLE"],
answer:"WHERE"
},

{
question:"What is the full form of DBMS?",
options:["Data Backup Main System","Database Management System","Digital Base Management","Dynamic Binary Main System"],
answer:"Database Management System"
},

{
question:"Which memory is temporary?",
options:["ROM","SSD","RAM","HDD"],
answer:"RAM"
},

{
question:"Which HTML tag inserts images?",
options:["<img>","<picture>","<image>","<src>"],
answer:"<img>"
}

];

let currentQuestion=0;
let score=0;
let timer=300;
let selectedQuestions=[];

const question=document.getElementById('question');
const options=document.getElementById('options');
const scoreText=document.getElementById('score');
const timerText=document.getElementById('timer');
const questionCount=document.getElementById('questionCount');
const resultBox=document.getElementById('resultBox');
const quizArea=document.getElementById('quizArea');
const finalScore=document.getElementById('finalScore');
const progressFill=document.getElementById('progressFill');

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

function loadQuestions(){
selectedQuestions=shuffle([...questionBank]).slice(0,10);
}

function showQuestion(){
let q=selectedQuestions[currentQuestion];

questionCount.innerHTML=Question ${currentQuestion+1} of ${selectedQuestions.length};
question.innerHTML=q.question;
options.innerHTML='';

shuffle([...q.options]).forEach(option=>{
const btn=document.createElement('div');
btn.classList.add('option');
btn.innerHTML=option;

btn.onclick=()=>selectAnswer(btn,option,q.answer);

options.appendChild(btn);
})
}

function selectAnswer(btn,selected,correct){
const allOptions=document.querySelectorAll('.option');

allOptions.forEach(opt=>opt.style.pointerEvents='none');

if(selected===correct){
btn.classList.add('correct');
score++;
scoreText.innerHTML=score;
}else{
btn.classList.add('wrong');

allOptions.forEach(opt=>{
if(opt.innerHTML===correct){
opt.classList.add('correct');
}
})
}
}

function nextQuestion(){
currentQuestion++;

if(currentQuestion<selectedQuestions.length){
showQuestion();
}else{
showResult();
}
}

function showResult(){
quizArea.style.display='none';
resultBox.style.display='block';

finalScore.innerHTML=You scored ${score} out of ${selectedQuestions.length};

let percent=(score/selectedQuestions.length)*100;

setTimeout(()=>{
progressFill.style.width=percent+'%';
},300)
}

function restartQuiz(){
currentQuestion=0;
score=0;
timer=300;
scoreText.innerHTML=0;
quizArea.style.display='block';
resultBox.style.display='none';
progressFill.style.width='0%';

loadQuestions();
showQuestion();
}

setInterval(()=>{
if(timer>0){
timer--;
timerText.innerHTML=timer;
}else{
showResult();
}
},1000)

loadQuestions();
showQuestion();

</script>

</body>
</html>
