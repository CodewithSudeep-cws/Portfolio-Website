<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Online Examination System</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --primary: #38bdf8;
      --accent: #818cf8;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Navbar */
    nav {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      padding: 15px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Timer box */
    .timer-box {
      background: rgba(244, 63, 94, 0.1);
      color: #f43f5e;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      border: 1px solid rgba(244, 63, 94, 0.2);
    }

    /* Main Container */
    .container {
      max-width: 850px;
      width: 90%;
      margin: 40px auto;
      flex-grow: 1;
    }

    /* Question Card */
    .quiz-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-bar {
      height: 6px;
      background: #334155;
      border-radius: 3px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.3s ease;
    }

    .q-number {
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: block;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    /* Options Layout */
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .option-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 18px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 1.1rem;
      transition: all 0.2s ease;
    }

    .option-box:hover {
      border-color: var(--primary);
      background: rgba(56, 189, 248, 0.05);
      transform: translateX(5px);
    }

    .option-box input[type="radio"] {
      accent-color: var(--primary);
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .option-box.selected {
      border-color: var(--primary);
      background: rgba(56, 189, 248, 0.1);
    }

    /* Action Buttons */
    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 35px;
    }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-secondary {
      background: #334155;
      color: var(--text);
    }

    .btn-secondary:hover:not(:disabled) {
      background: #475569;
    }

    .btn-secondary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(45deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
    }

    /* Result Dashboard */
    .result-screen {
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease forwards;
    }

    .score-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 5px solid var(--primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 30px auto;
      font-size: 2rem;
      font-weight: 700;
    }

    .score-circle span {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .stats-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
    }

    .stat-card.correct h3 { color: var(--success); }
    .stat-card.wrong h3 { color: var(--danger); }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo"><i class="fas fa-graduation-cap"></i> Portal | Exam System</div>
    <div class="timer-box"><i class="fas fa-clock"></i> <span id="timer">10:00</span></div>
  </nav>

  <div class="container">
    
    <div id="quiz-screen" class="quiz-card" data-aos="fade-up">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      
      <span id="q-count" class="q-number">Question 1 of 5</span>
      <div id="question" class="question-text">Loading question...</div>
      
      <div id="options" class="options-container">
        </div>

      <div class="btn-group">
        <button id="prev-btn" class="btn btn-secondary" onclick="prevQuestion()"><i class="fas fa-chevron-left"></i> Previous</button>
        <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()">Next <i class="fas fa-chevron-right"></i></button>
      </div>
    </div>

    <div id="result-screen" class="quiz-card result-screen">
      <h2><i class="fas fa-chart-bar" style="color: var(--primary);"></i> Examination Report Card</h2>
      <p style="color: var(--text-muted); margin-top: 5px;">Your test has been processed successfully.</p>
      
      <div class="score-circle" id="score-display">
        0/5
        <span>Final Score</span>
      </div>

      <h3 id="performance-msg">Good Effort!</h3>

      <div class="stats-container">
        <div class="stat-card correct">
          <p>Correct Answers</p>
          <h3 id="correct-count">0</h3>
        </div>
        <div class="stat-card wrong">
          <p>Wrong/Skipped Answers</p>
          <h3 id="wrong-count">0</h3>
        </div>
      </div>

      <button class="btn btn-primary" style="margin: 0 auto;" onclick="location.reload()"><i class="fas fa-redo"></i> Restart Exam</button>
    </div>

  </div>

  <footer>
    <p>© 2026 Smart Online Examination System. Designed for BCA/B.Sc Computer Application.</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init({ once: true });

    // Syllabus Ke Sabse Danger Questions Matrix (Java, DBMS, O.S, Web Tech)
    const quizData = [
      {
        question: "1. Java mein memory management के संदर्भ में, यदि कोई Object अब किसी भी Reference से जुड़ा नहीं है, तो उसे Garbage Collector के लिए योग्य बनाने का सबसे सटीक तरीका क्या है?",
        options: [
          "System.gc() को कॉल करना जो तुरंत ऑब्जेक्ट डिलीट करता है",
          "ऑब्जेक्ट के सभी रेफरेन्सेस को explicit रूप से 'null' सेट करना",
          "Runtime.getRuntime().runFinalization() का उपयोग करना",
          "Java Virtual Machine (JVM) को बंद कर देना"
        ],
        correct: 1
      },
      {
        question: "2. DBMS (SQL) में, 'Clustered Index' और 'Non-Clustered Index' के बीच मुख्य तकनीकी अंतर क्या है?",
        options: [
          "Clustered Index डेटा को फिजिकली आर्डर में स्टोर करता है, इसलिए एक टेबल में केवल एक ही हो सकता है।",
          "Non-Clustered Index डेटा को तेजी से डिलीट करता है जबकि Clustered केवल रीड करता है।",
          "एक टेबल में एकाधिक Clustered Index बनाए जा सकते हैं लेकिन Non-Clustered केवल एक।",
          "दोनों में कोई अंतर नहीं है, दोनों केवल सर्च स्पीड बढ़ाते हैं।"
        ],
        correct: 0
      },
      {
        question: "3. Operating System में, 'Deadlock Prevention' और 'Deadlock Avoidance' नीतियों में क्या मुख्य अंतर होता है?",
        options: [
          "Prevention हमेशा सुरक्षित स्टेट चेक करता है, जबकि Avoidance रिसोर्स को लॉक करता है।",
          "Prevention को रोकने के लिए Banker's Algorithm का प्रयोग किया जाता है।",
          "Prevention यह सुनिश्चित करता है कि डेडलॉक की 4 शर्तों में से कम से कम एक कभी सच न हो, जबकि Avoidance गतिशील रूप से सुरक्षित स्थिति (Safe State) की जांच करता है।",
          "Avoidance रिसोर्स यूटिलाइजेशन को पूरी तरह से बंद कर देता है।"
        ],
        correct: 2
      },
      {
        question: "4. Web Technology (HTML/CSS) में, यदि किसी एलिमेंट का 'position: absolute;' सेट किया गया है, तो वह पूरे वेब पेज पर किसके सापेक्ष (Relative) अपनी जगह तय करता है?",
        options: [
          "हमेशा सीधे <body> टैग के सापेक्ष",
          "अपने सबसे नजदीकी 'Positioned' (यानी जिसकी पोजीशन static न हो) पैरेंट एलिमेंट के सापेक्ष",
          "ब्राउज़र के व्यू-पोर्ट (Viewport) के सापेक्ष",
          "अपने ठीक पहले आने वाले सिबलिंग (Sibling) एलिमेंट के सापेक्ष"
        ],
        correct: 1
      },
      {
        question: "5. Java में Multi-threading के दौरान, 'synchronized' कीवर्ड का मुख्य उपयोग किस समस्या को रोकने के लिए किया जाता है?",
        options: [
          "Memory Leak की समस्या को हल करने के लिए",
          "Compile-time Exceptions को हैंडल करने के लिए",
          "Race Condition (जब मल्टीपल थ्रेड्स एक ही समय में कॉमन रिसोर्स बदलें) को रोकने के लिए",
          "प्रोग्राम के एग्जीक्यूशन की स्पीड को 10 गुना बढ़ाने के लिए"
        ],
        correct: 2
      }
    ];

    let currentQuestionIndex = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let totalTime = 600; // 10 Minutes Total

    // Timer Implementation
    const timerElement = document.getElementById("timer");
    const countdown = setInterval(() => {
      let minutes = Math.floor(totalTime / 60);
      let seconds = totalTime % 60;
      seconds = seconds < 10 ? '0' + seconds : seconds;
      minutes = minutes < 10 ? '0' + minutes : minutes;
      timerElement.innerHTML = `${minutes}:${seconds}`;
      
      if (totalTime <= 0) {
        clearInterval(countdown);
        alert("Time is up! Your exam is being submitted automatically.");
        submitExam();
      }
      totalTime--;
    }, 1000);

    // Initialize/Render Question Function
    function loadQuestion() {
      const currentQuiz = quizData[currentQuestionIndex];
      
      // Update Progress
      const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
      document.getElementById("progress-fill").style.width = `${progressPercent}%`;
      
      // Counter Text
      document.getElementById("q-count").innerText = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
      
      // Question Display
      document.getElementById("question").innerText = currentQuiz.question;
      
      // Options Clear and Render
      const optionsContainer = document.getElementById("options");
      optionsContainer.innerHTML = "";
      
      currentQuiz.options.forEach((option, index) => {
        const optionBox = document.createElement("div");
        optionBox.className = "option-box";
        if(userAnswers[currentQuestionIndex] === index) {
          optionBox.classList.add("selected");
        }
        
        optionBox.innerHTML = `
          <input type="radio" name="quiz-opt" id="opt-${index}" value="${index}" ${userAnswers[currentQuestionIndex] === index ? 'checked' : ''}>
          <label for="opt-${index}" style="width:100%; cursor:pointer;">${option}</label>
        `;
        
        // Handle select action click
        optionBox.addEventListener("click", () => {
          userAnswers[currentQuestionIndex] = index;
          document.querySelectorAll(".option-box").forEach(box => box.classList.remove("selected"));
          optionBox.classList.add("selected");
          optionBox.querySelector("input").checked = true;
        });
        
        optionsContainer.appendChild(optionBox);
      });

      // Manage Footer Nav Buttons
      document.getElementById("prev-btn").disabled = currentQuestionIndex === 0;
      
      if(currentQuestionIndex === quizData.length - 1) {
        document.getElementById("next-btn").innerHTML = `Submit Exam <i class="fas fa-check-double"></i>`;
        document.getElementById("next-btn").style.background = "linear-gradient(45deg, #10b981, #059669)";
      } else {
        document.getElementById("next-btn").innerHTML = `Next <i class="fas fa-chevron-right"></i>`;
        document.getElementById("next-btn").style.background = "linear-gradient(45deg, var(--primary), var(--accent))";
      }
    }

    function nextQuestion() {
      if(currentQuestionIndex === quizData.length - 1) {
        // Last question means Trigger Submission Logic
        if(confirm("क्या आप वाकई अपना एग्जाम सबमिट करना चाहते हैं?")) {
          submitExam();
        }
      } else {
        currentQuestionIndex++;
        loadQuestion();
      }
    }

    function prevQuestion() {
      if(currentQuestionIndex > 0) {
        currentQuestionIndex--;
        loadQuestion();
      }
    }

    // Evaluation Metric Logic
    function submitExam() {
      clearInterval(countdown);
      let score = 0;
      let correctAnswersCount = 0;
      let wrongAnswersCount = 0;

      quizData.forEach((questionData, index) => {
        if(userAnswers[index] === questionData.correct) {
          correctAnswersCount++;
          score += 4; // Adding positive scaling weight
        } else {
          wrongAnswersCount++;
        }
      });

      // Switch screen frames
      document.getElementById("quiz-screen").style.display = "none";
      const resultScreen = document.getElementById("result-screen");
      resultScreen.style.display = "block";

      // Inject data values into interface
      document.getElementById("score-display").innerHTML = `${correctAnswersCount}/${quizData.length} <span>(${score} Marks)</span>`;
      document.getElementById("correct-count").innerText = correctAnswersCount;
      document.getElementById("wrong-count").innerText = wrongAnswersCount;

      // Conditional performance messaging
      const msgElement = document.getElementById("performance-msg");
      if(correctAnswersCount === quizData.length) {
        msgElement.innerText = "Outstanding! Perfect Score. 🌟";
        msgElement.style.color = "var(--success)";
      } else if(correctAnswersCount >= 3) {
        msgElement.innerText = "Great Job! Well Qualified. 👍";
        msgElement.style.color = "var(--primary)";
      } else {
        msgElement.innerText = "Need Improvement! Keep Studying. 📚";
        msgElement.style.color = "var(--danger)";
      }
    }

    // Run Initial Load
    loadQuestion();
  </script>
</body>
  </html>
